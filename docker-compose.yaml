services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:2.5.0
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
      TELEGRAM_STAT: "true"
      TELEGRAM_VERBOSITY: "2" # Increase verbosity for easier debugging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /data/shared/telegram-api:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    container_name: telegram-bot-api
    labels:
      - "coolify.managed=true"
      - "coolify.proxy.port=8081"
      - "coolify.proxy.domain=shh.thept.ru"
      # Ensure proxy doesn't limit upload size
      - "nginx.ingress.kubernetes.io/proxy-body-size=0"
      - "traefik.http.middlewares.limit.buffering.maxRequestBodyBytes=0"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true
