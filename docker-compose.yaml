services:
  telegram-bot-api:
    build: .
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
      TELEGRAM_STAT: "true"
      TELEGRAM_VERBOSITY: "2"
      # SOCKS5 proxy for Telegram DC connections (optional, remove if not needed)
      SOCKS5_HOST: ${SOCKS5_HOST:-}
      SOCKS5_PORT: ${SOCKS5_PORT:-}
      SOCKS5_USER: ${SOCKS5_USER:-}
      SOCKS5_PASS: ${SOCKS5_PASS:-}
    # Required for iptables inside container (redsocks transparent proxy)
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /data/shared/telegram-api:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    container_name: telegram-bot-api
    labels:
      - "coolify.managed=true"
      - "coolify.proxy.port=8081"
      - "coolify.proxy.domain=shh.thept.ru"
      - "traefik.http.middlewares.limit.buffering.maxRequestBodyBytes=0"
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true
